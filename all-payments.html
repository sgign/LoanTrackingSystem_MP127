<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Tracking System - All Payments</title>
    <meta name="description" content="View and manage all payment records.">
    <link rel="stylesheet" href="styles.css?v=5">
    <style>
        #search-query:focus {
            border-color: #4caf50 !important;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.25) !important;
        }
        #search-query::placeholder { color: rgba(255,255,255,0.4); }
        .pg-toolbar .dropdown-trigger:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .pg-toolbar .custom-dropdown { position: relative; }
        .pg-toolbar .dropdown-menu { position: absolute; top: calc(100% + 8px); right: 0; left: auto; z-index: 200; }
    </style>
</head>

<body>
    <header class="header">
        <div class="profile">
            <div class="profile-avatar">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                </svg>
            </div>
            <span class="profile-name">David Pasumbal</span>
            <span class="active-loans-badge" id="active-loans-count">0 Active Loans</span>
        </div>
        <nav class="navbar-pill">
            <a href="index.html">Home</a>
            <a href="all-payments.html" class="active">All Payments</a>
            <a href="people-groups.html">People</a>
        </nav>
    </header>

    <main class="main-content">
        <h1 class="page-title">All Payments Records</h1>

        <!-- Search & Filter Controls -->
        <div class="pg-toolbar" style="display: flex; gap: 0.75rem; align-items: center; margin-bottom: 2rem; flex-wrap: wrap;">
            <!-- Search Input — pill style matching People page -->
            <div class="pg-search-wrap" style="flex: 1; min-width: 220px; position: relative;">
                <input type="text" id="search-query" placeholder="Search by entry name, borrower, lender..." autocomplete="off"
                    style="width: 100%; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.15); border-radius: 50px; padding: 0.72rem 2.8rem 0.72rem 1.25rem; color: #fff; font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; box-sizing: border-box;">
                <img src="assets/search.png" alt="Search" style="position: absolute; right: 1.1rem; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; opacity: 0.6; pointer-events: none;">
            </div>

            <!-- Type Filter — green gradient pill -->
            <div class="custom-dropdown" id="dropdown-type" style="position: relative;">
                <button type="button" class="dropdown-trigger"
                    style="display: inline-flex; align-items: center; gap: 0.5rem; background: url('assets/Green Gradient.png') no-repeat center/cover; color: #fff; border: 2px solid #fff; border-radius: 50px; height: 44px; padding: 0 1.25rem; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; transition: transform 0.2s, filter 0.2s; box-shadow: none;">
                    <span class="selected-value">All Types</span>
                    <img src="assets/dropdown.png" alt="▾" style="width: 12px; height: 12px; filter: brightness(0) invert(1);">
                </button>
                <div class="dropdown-menu" style="min-width: 160px;">
                    <button type="button" class="dropdown-item active" data-value="">All Types</button>
                    <button type="button" class="dropdown-item" data-value="Straight Expense">Straight Expense</button>
                    <button type="button" class="dropdown-item" data-value="Installment Expense">Installment Expense</button>
                    <button type="button" class="dropdown-item" data-value="Group Expense">Group Expense</button>
                </div>
            </div>
            <select id="filter-type" style="display: none;">
                <option value="">All Types</option>
                <option value="Straight Expense">Straight Expense</option>
                <option value="Installment Expense">Installment Expense</option>
                <option value="Group Expense">Group Expense</option>
            </select>

            <!-- Status Filter — green gradient pill -->
            <div class="custom-dropdown" id="dropdown-status" style="position: relative;">
                <button type="button" class="dropdown-trigger"
                    style="display: inline-flex; align-items: center; gap: 0.5rem; background: url('assets/Green Gradient.png') no-repeat center/cover; color: #fff; border: 2px solid #fff; border-radius: 50px; height: 44px; padding: 0 1.25rem; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; transition: transform 0.2s, filter 0.2s; box-shadow: none;">
                    <span class="selected-value">All Statuses</span>
                    <img src="assets/dropdown.png" alt="▾" style="width: 12px; height: 12px; filter: brightness(0) invert(1);">
                </button>
                <div class="dropdown-menu" style="min-width: 160px; right: 0; left: auto;">
                    <button type="button" class="dropdown-item active" data-value="">All Statuses</button>
                    <button type="button" class="dropdown-item" data-value="NOT STARTED">NOT STARTED</button>
                    <button type="button" class="dropdown-item" data-value="UNPAID">UNPAID</button>
                    <button type="button" class="dropdown-item" data-value="PARTIALLY PAID">PARTIALLY PAID</button>
                    <button type="button" class="dropdown-item" data-value="PAID">PAID</button>
                    <button type="button" class="dropdown-item" data-value="DELINQUENT">DELINQUENT</button>
                </div>
            </div>
            <select id="filter-status" style="display: none;">
                <option value="">All Statuses</option>
                <option value="NOT STARTED">NOT STARTED</option>
                <option value="UNPAID">UNPAID</option>
                <option value="PARTIALLY PAID">PARTIALLY PAID</option>
                <option value="PAID">PAID</option>
                <option value="DELINQUENT">DELINQUENT</option>
            </select>
        </div>

        <!-- Transactions Section -->
        <section class="transactions-section">
            <div class="pg-list" id="all-transactions-cards">
                <div style="text-align: center; padding: 3.5rem 1rem; color: rgba(255,255,255,0.45); font-size: 1rem;">
                    Loading entries...
                </div>
            </div>
        </section>

        <!-- Actions Footer removed -->


    </main>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let allLoans = [];

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'decimal',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount || 0);
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return d.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        async function fetchLoans() {
            try {
                const response = await fetch(`${API_BASE}/entries`);
                if (!response.ok) throw new Error('Failed to fetch entries');
                allLoans = await response.json();
                
                // Update active loans badge
                const activeLoansCount = allLoans.filter(l => l.paymentStatus !== 'PAID' && Math.round(l.amountRemaining || 0) > 0).length;
                const activeBadge = document.getElementById('active-loans-count');
                if (activeBadge) {
                    activeBadge.innerHTML = `<strong>${activeLoansCount}</strong> Active Loan${activeLoansCount !== 1 ? 's' : ''}`;
                }

                renderLoans(allLoans);
            } catch (err) {
                console.error(err);
                document.getElementById('all-transactions-cards').innerHTML = `
                    <div style="text-align: center; padding: 3.5rem 1rem; color: #ff8a80; font-size: 1rem;">
                        Failed to load entries. Make sure backend is running on port 8080.
                    </div>
                `;
            }
        }

        function getInitials(name) {
            if (!name) return 'L';
            const parts = name.trim().split(/\s+/);
            if (parts.length >= 2) {
                return (parts[0][0] + parts[1][0]).toUpperCase();
            }
            return parts[0].substring(0, 2).toUpperCase();
        }

        function toggleCardBody(id, event) {
            if (event) event.stopPropagation();
            const body = document.getElementById(`body-${id}`);
            if (!body) return;
            const isOpen = body.classList.contains('open');
            document.querySelectorAll('.pg-card-body.open').forEach(b => {
                if (b !== body) b.classList.remove('open');
            });
            body.classList.toggle('open');
        }

        function goToEdit(id, event) {
            if (event) event.stopPropagation();
            window.location.href = `entry-detail.html?id=${id}`;
        }

        // ── DELETE MODAL ──
        let _deleteId = null;

        function deleteLoanEntry(id, name, event) {
            if (event) event.stopPropagation();
            _deleteId = id;
            document.getElementById('ap-delete-name').textContent = `"${name}"`;
            document.getElementById('ap-delete-modal').classList.add('open');
        }

        function closeApDeleteModal() {
            _deleteId = null;
            document.getElementById('ap-delete-modal').classList.remove('open');
        }

        async function confirmApDelete() {
            if (!_deleteId) return;
            const id = _deleteId;
            closeApDeleteModal();
            try {
                await fetch(`${API_BASE}/payments/by-entry/${id}`, { method: 'DELETE' });
                const res = await fetch(`${API_BASE}/entries/${id}`, { method: 'DELETE' });
                if (res.ok || res.status === 204) {
                    fetchLoans();
                } else {
                    const err = await res.text();
                    alert('Failed to delete entry: ' + err);
                }
            } catch (err) {
                alert('Network error: ' + err.message);
            }
        }

        function renderLoans(loans) {
            const container = document.getElementById('all-transactions-cards');
            container.innerHTML = '';

            if (loans.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 3.5rem 1rem; color: rgba(255,255,255,0.45); font-size: 1rem;">
                        No matching entries found.
                    </div>
                `;
                return;
            }

            loans.forEach(loan => {
                let displayStatus = loan.paymentStatus || 'UNPAID';
                if (Math.round(loan.amountRemaining || 0) <= 0) {
                    displayStatus = 'PAID';
                }
                const statusClass = displayStatus.toLowerCase().replace(' ', '-');
                const safeName = (loan.entryName || 'Unnamed').replace(/'/g, "\\'");
                const repaid = (loan.amountBorrowed || 0) - (loan.amountRemaining || 0);
                const refText = loan.referenceId ? `Ref ${loan.referenceId}` : '';

                const card = document.createElement('div');
                card.className = 'pg-card';
                card.id = `card-${loan.entryId}`;

                card.innerHTML = `
                    <div class="pg-card-header">
                        <div class="pg-card-name" style="display: flex; align-items: baseline; gap: 0.6rem;">
                            <span>${loan.entryName || 'Unnamed'}</span>
                            <span style="font-size: 0.85rem; font-weight: 500; color: rgba(255, 255, 255, 0.7);">${refText}</span>
                        </div>
                        <span class="status-badge ${statusClass}" style="background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.15); color: #fff;">${displayStatus}</span>
                        <div class="pg-card-actions">
                            <button class="btn-pg-view" onclick="toggleCardBody('${loan.entryId}', event)">
                                <svg viewBox="0 0 24 24" style="width: 14px; height: 14px; fill: currentColor; margin-right: 4px;">
                                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                </svg>
                                View All
                            </button>
                            <button class="btn-pg-icon btn-pg-edit" onclick="goToEdit('${loan.entryId}', event)" title="Edit">
                                <img src="assets/edit.png" style="width: 16px; height: 16px; filter: brightness(0) invert(1);" alt="Edit">
                            </button>
                            <button class="btn-pg-icon btn-pg-delete" onclick="deleteLoanEntry('${loan.entryId}', '${safeName}', event)" title="Delete">
                                <img src="assets/delete.png" style="width: 16px; height: 16px; filter: brightness(0) invert(1);" alt="Delete">
                            </button>
                        </div>
                    </div>
                    <div class="pg-card-body loan-card-white-body" id="body-${loan.entryId}">
                        <div class="loan-details-grid-mockup">
                            <div class="loan-detail-item">
                                <span class="loan-detail-label">Type</span>
                                <span class="loan-detail-value">${loan.transactionType || 'Straight'}</span>
                            </div>
                            <div class="loan-detail-item">
                                <span class="loan-detail-label">Borrower</span>
                                <span class="loan-detail-value">${loan.borrowerPersonName || loan.borrowerGroupName || 'None'}</span>
                            </div>
                            <div class="loan-detail-item">
                                <span class="loan-detail-label">Lender</span>
                                <span class="loan-detail-value">${loan.lenderPersonName || 'None'}</span>
                            </div>
                            <div class="loan-detail-item">
                                <span class="loan-detail-label">Amount Borrowed</span>
                                <span class="loan-detail-value">₱${formatCurrency(loan.amountBorrowed)}</span>
                            </div>
                            <div class="loan-detail-item">
                                <span class="loan-detail-label">Amount Remaining</span>
                                <span class="loan-detail-value">₱${formatCurrency(loan.amountRemaining)}</span>
                            </div>
                            <div class="loan-detail-item">
                                <span class="loan-detail-label">Date Borrowed</span>
                                <span class="loan-detail-value">${formatDate(loan.dateBorrowed)}</span>
                            </div>
                        </div>
                        <div class="card-footer-actions" style="border-top: 1px solid rgba(0, 0, 0, 0.08); padding-top: 1rem; margin-top: 0.5rem;">
                            <a href="payment-records.html?id=${loan.entryId}" class="btn btn-primary" style="padding: 0.55rem 1.5rem; font-size: 0.95rem; border-radius: 50px; text-decoration: none;">
                                💳 View Payment Records Dashboard
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function applyFilters() {
            const query = document.getElementById('search-query').value.toLowerCase().trim();
            const selectedType = document.getElementById('filter-type').value;
            const selectedStatus = document.getElementById('filter-status').value;

            const filtered = allLoans.filter(loan => {
                // Text search matching
                const entryName = (loan.entryName || '').toLowerCase();
                const description = (loan.description || '').toLowerCase();
                const borrower = (loan.borrowerPersonName || loan.borrowerGroupName || '').toLowerCase();
                const lender = (loan.lenderPersonName || '').toLowerCase();
                const refId = (loan.referenceId || '').toLowerCase();

                const matchesQuery = !query ||
                    entryName.includes(query) ||
                    description.includes(query) ||
                    borrower.includes(query) ||
                    lender.includes(query) ||
                    refId.includes(query);

                // Dropdown type filter
                const matchesType = !selectedType || loan.transactionType === selectedType;

                // Dropdown status filter
                const matchesStatus = !selectedStatus || loan.paymentStatus === selectedStatus;

                return matchesQuery && matchesType && matchesStatus;
            });

            renderLoans(filtered);
        }

        document.getElementById('search-query').addEventListener('input', applyFilters);
        document.getElementById('filter-type').addEventListener('change', applyFilters);
        document.getElementById('filter-status').addEventListener('change', applyFilters);

        // Removed filter toggle logic since filters are now inline

        function setupCustomDropdowns() {
            const dropdowns = document.querySelectorAll('.custom-dropdown');
            
            dropdowns.forEach(dropdown => {
                const trigger = dropdown.querySelector('.dropdown-trigger');
                const menu = dropdown.querySelector('.dropdown-menu');
                const items = dropdown.querySelectorAll('.dropdown-item');
                const selectId = dropdown.id.replace('dropdown-', 'filter-');
                const hiddenSelect = document.getElementById(selectId);
                const selectedValSpan = dropdown.querySelector('.selected-value');

                // Toggle dropdown menu on click
                trigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // Close other dropdowns first
                    dropdowns.forEach(other => {
                        if (other !== dropdown) other.classList.remove('open');
                    });
                    dropdown.classList.toggle('open');
                });

                // Handle item selection
                items.forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const val = item.getAttribute('data-value');
                        const label = item.textContent.trim();

                        // Update text in trigger
                        selectedValSpan.textContent = label;

                        // Update active state in dropdown list
                        items.forEach(i => i.classList.remove('active'));
                        item.classList.add('active');

                        // Close dropdown
                        dropdown.classList.remove('open');

                        // Sync with hidden native select and trigger filters
                        if (hiddenSelect) {
                            hiddenSelect.value = val;
                            hiddenSelect.dispatchEvent(new Event('change'));
                        }
                    });
                });
            });

            // Close all dropdowns if clicking outside
            document.addEventListener('click', () => {
                dropdowns.forEach(d => d.classList.remove('open'));
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchLoans();
            setupCustomDropdowns();
        });
    </script>

    <!-- ── DELETE CONFIRM MODAL ── -->
    <div class="pg-modal-overlay" id="ap-delete-modal" onclick="if(event.target===this)closeApDeleteModal()">
        <div class="pg-modal">
            <h2>Confirm Delete</h2>
            <p style="color:rgba(255,255,255,0.7);margin-bottom:0.5rem;">Are you sure you want to delete <strong id="ap-delete-name" style="color:#fff;"></strong>?</p>
            <p style="color:#ef9a9a;font-size:0.85rem;">All payment records for this entry will also be deleted. This action cannot be undone.</p>
            <div class="pg-modal-actions">
                <button class="ap-btn-cancel" onclick="closeApDeleteModal()">Cancel</button>
                <button class="ap-btn-delete" onclick="confirmApDelete()">Delete</button>
            </div>
        </div>
    </div>

    <style>
        .pg-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;}
        .pg-modal-overlay.open{display:flex;}
        .pg-modal{background:#0e130f;border:1.5px solid rgba(255,255,255,0.12);border-radius:20px;padding:2.25rem;width:100%;max-width:440px;box-shadow:0 16px 60px rgba(0,0,0,0.6);animation:apIn 0.2s ease-out;}
        @keyframes apIn{from{opacity:0;transform:translateY(-20px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
        .pg-modal h2{font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:1.25rem;letter-spacing:-0.3px;}
        .pg-modal-actions{display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.75rem;padding-top:1.25rem;border-top:1px solid rgba(255,255,255,0.08);}
        .ap-btn-delete{background:#e53935;color:#fff;border:none;border-radius:50px;padding:0.6rem 1.5rem;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.2s;}
        .ap-btn-delete:hover{background:#c62828;}
        .ap-btn-cancel{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);border:1.5px solid rgba(255,255,255,0.15);border-radius:50px;padding:0.6rem 1.5rem;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.2s;}
        .ap-btn-cancel:hover{background:rgba(255,255,255,0.14);}
    </style>

</body>

</html>
