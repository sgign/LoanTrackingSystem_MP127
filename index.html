<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Tracking System - Home</title>
    <meta name="description" content="Overview dashboard of your loan tracking.">
    <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>
    <header class="header">
        <div class="profile">
            <div class="profile-avatar">
                <svg viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <span class="profile-name">David Pasumbal</span>
            <span class="active-loans-badge" id="active-loans-count">0 Active Loans</span>
        </div>
        <nav class="navbar-pill">
            <a href="index.html" class="active">Home</a>
            <a href="all-payments.html">All Payments</a>
            <a href="people-groups.html">People</a>
        </nav>
    </header>

    <main class="main-content">
        <h1 class="page-title">Home</h1>

        <div id="alerts-container" class="alerts-container"></div>

        <section class="metrics-grid">
            <div class="metric-card">
                <span class="metric-label">Total Lent</span>
                <span class="metric-value" id="total-lent">0.00</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Total Borrowed</span>
                <span class="metric-value" id="total-borrowed">0.00</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Total Outstanding</span>
                <span class="metric-value" id="total-outstanding">0.00</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Total Settleed</span>
                <span class="metric-value" id="total-settled">0</span>
            </div>
        </section>

        <section class="transactions-section">
            <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 class="section-title" style="margin-bottom: 0;">Recent Transactions</h2>
                <div class="actions-header" style="display: flex; gap: 1rem; align-items: center;">
                    <a href="entry-detail.html" class="btn-new-entry">+ New Entry</a>
                    <a href="all-payments.html" class="btn-view-all" style="display: flex; align-items: center;">
                        <img src="greenview.png" style="width: 18px; height: 18px; margin-right: 0.5rem;" alt="View All">
                        View All
                    </a>
                </div>
            </div>
            <div class="transactions-table-container">
                <table class="transactions-table">
                    <thead>
                        <tr>
                            <th>Ref. ID</th>
                            <th>Entry Name</th>
                            <th>Borrower</th>
                            <th>Lender</th>
                            <th>Amount Paid</th>
                            <th>Amount Remaining</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="recent-transactions-body">
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 2rem;">Loading transactions...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>


    </main>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        const USER_ID = '11111111-1111-1111-1111-111111111111'; // David Pasumbal

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'decimal',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(Math.round(amount || 0));
        }

        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/entries`);
                if (!response.ok) throw new Error('Failed to fetch loans');
                const loans = await response.json();

                // Update active loans badge
                const activeLoansCount = loans.filter(l => l.paymentStatus !== 'PAID').length;
                const activeBadge = document.getElementById('active-loans-count');
                if (activeBadge) {
                    activeBadge.innerHTML = `<strong>${activeLoansCount}</strong> Active Loan${activeLoansCount !== 1 ? 's' : ''}`;
                }

                // Calculate metrics
                let totalLent = 0;
                let totalBorrowed = 0;
                let outstandingLent = 0;
                let outstandingBorrowed = 0;
                let totalSettled = 0;
                const overdueAlerts = [];

                loans.forEach(loan => {
                    const remaining = loan.amountRemaining || 0;
                    const borrowed = loan.amountBorrowed || 0;
                    const paid = borrowed - remaining;

                    // Lent = David is the lender (money owed to David)
                    // Borrowed = David is the borrower (money David owes)
                    // Since this is a personal tracker, sum everything:
                    // Entries where lenderPersonName matches the profile name = Total Lent
                    // Entries where borrowerPersonName matches the profile name = Total Borrowed
                    const profileName = (document.querySelector('.profile-name')?.textContent || '').toLowerCase();
                    const lenderName = (loan.lenderPersonName || '').toLowerCase();
                    const borrowerName = (loan.borrowerPersonName || loan.borrowerGroupName || '').toLowerCase();

                    const isLender = profileName && lenderName && lenderName.includes(profileName.split(' ')[0]);
                    const isBorrower = profileName && borrowerName && borrowerName.includes(profileName.split(' ')[0]);

                    if (isLender) {
                        totalLent += borrowed;
                        outstandingLent += remaining;
                        totalSettled += paid;
                    } else if (isBorrower) {
                        totalBorrowed += borrowed;
                        outstandingBorrowed += remaining;
                        totalSettled += paid;
                    } else {
                        // Entry not directly linked to profile name — count in both for summary
                        totalLent += borrowed;
                        outstandingLent += remaining;
                        totalSettled += paid;
                    }

                    // Installment alerts — show for all entries
                    if (loan.installmentPlan && loan.installmentPlan.terms) {
                        loan.installmentPlan.terms.forEach(term => {
                            const status = term.status ? term.status.toUpperCase() : '';
                            if (status === 'DELINQUENT') {
                                overdueAlerts.push({ loan, term, isLender: true, isBorrower: false });
                            }
                        });
                    }
                });

                const totalOutstanding = outstandingLent + outstandingBorrowed;

                // Update UI elements
                document.getElementById('total-lent').textContent = formatCurrency(totalLent);
                document.getElementById('total-borrowed').textContent = formatCurrency(totalBorrowed);
                
                const outstandingEl = document.getElementById('total-outstanding');
                outstandingEl.textContent = formatCurrency(totalOutstanding);

                document.getElementById('total-settled').textContent = formatCurrency(totalSettled);

                // Render Alerts
                const alertsContainer = document.getElementById('alerts-container');
                alertsContainer.innerHTML = '';

                // Overdue Alerts
                overdueAlerts.forEach(alert => {
                    const card = document.createElement('div');
                    card.className = 'alert-card delinquent';
                    card.onclick = () => {
                        window.location.href = `entry-detail.html?id=${alert.loan.entryId}`;
                    };

                    const amt = formatCurrency(alert.loan.installmentPlan.amountPerTerm);
                    const lenderOrBorrowerMsg = alert.isBorrower 
                        ? `You owe <strong>₱${amt}</strong> to <strong>${alert.loan.lenderPersonName || 'Lender'}</strong>`
                        : `<strong>${alert.loan.borrowerPersonName || alert.loan.borrowerGroupName || 'Borrower'}</strong> owes you <strong>₱${amt}</strong>`;
                    
                    const formattedDate = new Date(alert.term.dueDate).toLocaleDateString('en-US', {
                        month: 'short', day: 'numeric', year: 'numeric'
                    });

                    card.innerHTML = `
                        <div class="alert-icon">⚠️</div>
                        <div class="alert-content">
                            <span class="alert-title">Overdue Installment (Term #${alert.term.termNumber})</span>
                            <span class="alert-message">${lenderOrBorrowerMsg} for "${alert.loan.entryName}"</span>
                            <span class="alert-meta">Was due on ${formattedDate}</span>
                        </div>
                        <div class="alert-action">Resolve</div>
                    `;
                    alertsContainer.appendChild(card);
                });

                // Render recent transactions (up to 5, sorted by ID or date or just last added)
                // Let's assume order is fine, or sort descending if we want
                const recentLoans = [...loans].reverse().slice(0, 5);
                const tbody = document.getElementById('recent-transactions-body');
                tbody.innerHTML = '';

                if (recentLoans.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 2rem; color: rgba(255,255,255,0.5);">No transactions found.</td></tr>`;
                    return;
                }

                recentLoans.forEach(loan => {
                    const row = document.createElement('tr');
                    // Display-only row — no click navigation

                    const amountPaid = (loan.amountBorrowed || 0) - (loan.amountRemaining || 0);
                    
                    // Display status directly from database (UNPAID, PARTIALLY PAID, PAID)
                    const displayStatus = loan.paymentStatus || 'UNPAID';
                    const statusClass = displayStatus.toLowerCase().replace(/ /g, '-');

                    row.innerHTML = `
                        <td><strong>${loan.referenceId || 'N/A'}</strong></td>
                        <td>${loan.entryName || 'Unnamed'}</td>
                        <td>${loan.borrowerPersonName || loan.borrowerGroupName || 'None'}</td>
                        <td>${loan.lenderPersonName || 'None'}</td>
                        <td>${formatCurrency(amountPaid)}</td>
                        <td>${formatCurrency(loan.amountRemaining)}</td>
                        <td><span class="status-badge ${statusClass}">${displayStatus}</span></td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('recent-transactions-body').innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 2rem; color: #ff8a80;">
                            Failed to load loans. Make sure backend is running on port 8080.
                        </td>
                    </tr>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
