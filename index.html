<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Tracking System - Home</title>
    <meta name="description" content="Overview dashboard of your loan tracking.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="profile">
            <div class="profile-avatar">
                <svg viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <span class="profile-name">David Pasumbal</span>
        </div>
        <nav class="navbar-pill">
            <a href="index.html" class="active">Home</a>
            <a href="all-payments.html">All Loans</a>
            <a href="people-groups.html">People</a>
        </nav>
    </header>

    <main class="main-content">
        <h1 class="page-title">Home</h1>

        <section class="metrics-grid">
            <div class="metric-card">
                <span class="metric-label">Total Lent</span>
                <span class="metric-value" id="total-lent">0.00</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Total Borrowed</span>
                <span class="metric-value" id="total-borrowed">0.00</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Total Outstanding</span>
                <span class="metric-value" id="total-outstanding">0.00</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Total Settled</span>
                <span class="metric-value" id="total-settled">0.00</span>
            </div>
        </section>

        <section class="transactions-section">
            <h2 class="section-title">Recent Transactions</h2>
            <div class="transactions-table-container">
                <table class="transactions-table">
                    <thead>
                        <tr>
                            <th>Ref. ID</th>
                            <th>Entry Name</th>
                            <th>Borrower</th>
                            <th>Lender</th>
                            <th>Amount Paid</th>
                            <th>Amount Remaining</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="recent-transactions-body">
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 2rem;">Loading transactions...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <div class="actions-footer">
            <a href="entry-detail.html" class="btn-new-entry">+ New Entry</a>
            <a href="all-payments.html" class="btn-view-all">
                <svg viewBox="0 0 24 24">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
                View All
            </a>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        const USER_ID = '11111111-1111-1111-1111-111111111111'; // David Pasumbal

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'decimal',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount || 0);
        }

        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/entries`);
                if (!response.ok) throw new Error('Failed to fetch loans');
                const loans = await response.json();

                // Calculate metrics
                let totalLent = 0;
                let totalBorrowed = 0;
                let outstandingLent = 0;
                let outstandingBorrowed = 0;
                let totalSettled = 0;

                loans.forEach(loan => {
                    const isLender = loan.lenderPersonId === USER_ID;
                    const isBorrower = loan.borrowerPersonId === USER_ID;
                    const remaining = loan.amountRemaining || 0;
                    const borrowed = loan.amountBorrowed || 0;
                    const paid = borrowed - remaining;

                    if (isLender) {
                        totalLent += borrowed;
                        outstandingLent += remaining;
                        totalSettled += paid;
                    }
                    if (isBorrower) {
                        totalBorrowed += borrowed;
                        outstandingBorrowed += remaining;
                        totalSettled += paid;
                    }
                });

                const netOutstanding = outstandingLent - outstandingBorrowed;

                // Update UI elements
                document.getElementById('total-lent').textContent = formatCurrency(totalLent);
                document.getElementById('total-borrowed').textContent = formatCurrency(totalBorrowed);
                
                const outstandingEl = document.getElementById('total-outstanding');
                outstandingEl.textContent = formatCurrency(Math.abs(netOutstanding));
                if (netOutstanding < 0) {
                    outstandingEl.style.color = '#ff8a80'; // reddish if net borrowed
                } else if (netOutstanding > 0) {
                    outstandingEl.style.color = '#a5d6a7'; // greenish if net lent
                } else {
                    outstandingEl.style.color = '#ffffff';
                }

                document.getElementById('total-settled').textContent = formatCurrency(totalSettled);

                // Render recent transactions (up to 5, sorted by ID or date or just last added)
                // Let's assume order is fine, or sort descending if we want
                const recentLoans = [...loans].reverse().slice(0, 5);
                const tbody = document.getElementById('recent-transactions-body');
                tbody.innerHTML = '';

                if (recentLoans.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 2rem; color: rgba(255,255,255,0.5);">No transactions found.</td></tr>`;
                    return;
                }

                recentLoans.forEach(loan => {
                    const row = document.createElement('tr');
                    // Display-only row — no click navigation

                    const amountPaid = (loan.amountBorrowed || 0) - (loan.amountRemaining || 0);
                    const statusClass = (loan.paymentStatus || 'unpaid').toLowerCase().replace(' ', '-');

                    row.innerHTML = `
                        <td><strong>${loan.referenceId || 'N/A'}</strong></td>
                        <td>${loan.entryName || 'Unnamed'}</td>
                        <td>${loan.borrowerPersonName || loan.borrowerGroupName || 'None'}</td>
                        <td>${loan.lenderPersonName || 'None'}</td>
                        <td>${formatCurrency(amountPaid)}</td>
                        <td>${formatCurrency(loan.amountRemaining)}</td>
                        <td><span class="status-badge ${statusClass}">${loan.paymentStatus || 'UNPAID'}</span></td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('recent-transactions-body').innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 2rem; color: #ff8a80;">
                            Failed to load loans. Make sure backend is running on port 8080.
                        </td>
                    </tr>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
