<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Tracking System - Entry Detail</title>
    <meta name="description" content="Detailed information about a specific loan entry.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="profile">
            <div class="profile-avatar">
                <svg viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <span class="profile-name">David Pasumbal</span>
        </div>
        <nav class="navbar-pill">
            <a href="index.html">Home</a>
            <a href="all-payments.html">All Loans</a>
            <a href="people-groups.html">People</a>
        </nav>
    </header>

    <main class="main-content">
        <h1 class="page-title" id="page-title">New Loan Entry</h1>

        <!-- Info Banner (shown only in Edit mode) -->
        <div id="info-banner" class="info-banner hidden">
            <span class="info-banner-icon">ℹ️</span>
            <div class="info-banner-content">
                Reference ID: <strong id="info-ref-id">N/A</strong> &nbsp;|&nbsp;
                Remaining Balance: <strong id="info-remaining">0.00</strong> &nbsp;|&nbsp;
                Status: <span id="info-status-badge" class="status-badge unpaid">UNPAID</span>
            </div>
        </div>

        <div class="form-container">
            <form id="loan-form">
                <div class="form-grid">
                    
                    <!-- Entry Name -->
                    <div class="form-group">
                        <label for="entryName">Entry Name <span class="required">*</span></label>
                        <input type="text" id="entryName" class="form-input" required placeholder="e.g. Laptop Purchase Loan">
                    </div>

                    <!-- Transaction Type -->
                    <div class="form-group">
                        <label for="transactionType">Transaction Type <span class="required">*</span></label>
                        <select id="transactionType" class="form-select" required>
                            <option value="" disabled selected>Select Type</option>
                            <option value="Straight Expense">Straight Expense</option>
                            <option value="Installment Expense">Installment Expense</option>
                            <option value="Group Expense">Group Expense</option>
                        </select>
                    </div>

                    <!-- Description -->
                    <div class="form-group full-width">
                        <label for="description">Description</label>
                        <input type="text" id="description" class="form-input" placeholder="e.g. Loan for work accessories">
                    </div>

                    <!-- Date Borrowed -->
                    <div class="form-group">
                        <label for="dateBorrowed">Date Borrowed</label>
                        <input type="date" id="dateBorrowed" class="form-input">
                    </div>

                    <!-- Date Fully Paid -->
                    <div class="form-group">
                        <label for="dateFullyPaid">Date Fully Paid</label>
                        <input type="date" id="dateFullyPaid" class="form-input">
                    </div>

                    <!-- Borrower Type Selection -->
                    <div class="form-group">
                        <label>Borrower Type <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="borrowerType" id="borrowerTypePerson" value="person" checked>
                                Person
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="borrowerType" id="borrowerTypeGroup" value="group">
                                Group
                            </label>
                        </div>
                    </div>

                    <!-- Borrower Inputs (Toggled via JS) -->
                    <div class="form-group" id="borrower-person-group">
                        <label for="borrowerPersonName">Borrower Person <span class="required">*</span></label>
                        <input type="text" id="borrowerPersonName" class="form-input" required placeholder="e.g. Shanessa Tugaoen">
                    </div>

                    <div class="form-group hidden" id="borrower-group-group">
                        <label for="borrowerGroupName">Borrower Group <span class="required">*</span></label>
                        <input type="text" id="borrowerGroupName" class="form-input" placeholder="e.g. Work Friends">
                    </div>

                    <!-- Lender Input -->
                    <div class="form-group">
                        <label for="lenderPersonName">Lender <span class="required">*</span></label>
                        <input type="text" id="lenderPersonName" class="form-input" required placeholder="e.g. David Jonathan Pasumbal">
                    </div>

                    <!-- Amount Borrowed -->
                    <div class="form-group">
                        <label for="amountBorrowed">Amount Borrowed <span class="required">*</span></label>
                        <input type="number" id="amountBorrowed" class="form-input" min="0.01" step="0.01" required placeholder="0.00">
                    </div>

                    <!-- Amount Remaining (Only visible in edit mode) -->
                    <div class="form-group hidden" id="amount-remaining-group">
                        <label for="amountRemaining">Amount Remaining</label>
                        <input type="number" id="amountRemaining" class="form-input" min="0" step="0.01" placeholder="0.00">
                    </div>

                    <!-- Payment Status (Only visible in edit mode) -->
                    <div class="form-group hidden" id="payment-status-group">
                        <label for="paymentStatus">Payment Status</label>
                        <select id="paymentStatus" class="form-select">
                            <option value="UNPAID">UNPAID</option>
                            <option value="PARTIALLY PAID">PARTIALLY PAID</option>
                            <option value="PAID">PAID</option>
                        </select>
                    </div>

                    <!-- Notes -->
                    <div class="form-group full-width">
                        <label for="notes">Notes</label>
                        <textarea id="notes" class="form-textarea" placeholder="Add loan details, conditions, notes..."></textarea>
                    </div>

                    <!-- Payment Notes -->
                    <div class="form-group full-width">
                        <label for="paymentNotes">Payment Notes</label>
                        <textarea id="paymentNotes" class="form-textarea" placeholder="Add payment records, plans..."></textarea>
                    </div>

                    <!-- Receipt / Proof of Loan -->
                    <div class="form-group full-width image-upload-wrapper">
                        <label for="receiptFile">Receipt or Proof of Loan</label>
                        <input type="file" id="receiptFile" class="form-input" accept="image/*">
                        <div class="image-preview-container">
                            <img id="image-preview" src="" alt="Receipt Preview" class="hidden">
                            <span id="image-placeholder" class="image-preview-placeholder">No receipt uploaded</span>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-delete" class="btn btn-danger hidden">Delete Entry</button>
                    <a href="index.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Entry</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        const DEFAULT_LENDER_ID = '11111111-1111-1111-1111-111111111111'; // David Pasumbal

        const urlParams = new URLSearchParams(window.location.search);
        const entryId = urlParams.get('id');

        let receiptBase64 = null;

        function formatDateForInput(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            const month = '' + (d.getMonth() + 1);
            const day = '' + d.getDate();
            const year = d.getFullYear();
            return [year, month.padStart(2, '0'), day.padStart(2, '0')].join('-');
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'decimal',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount || 0);
        }

        // Toggle Borrower fields
        function toggleBorrowerFields() {
            const isPerson = document.getElementById('borrowerTypePerson').checked;
            const personGroup = document.getElementById('borrower-person-group');
            const groupGroup = document.getElementById('borrower-group-group');
            const personInput = document.getElementById('borrowerPersonName');
            const groupInput = document.getElementById('borrowerGroupName');

            if (isPerson) {
                personGroup.classList.remove('hidden');
                groupGroup.classList.add('hidden');
                personInput.setAttribute('required', '');
                groupInput.removeAttribute('required');
            } else {
                personGroup.classList.add('hidden');
                groupGroup.classList.remove('hidden');
                groupInput.setAttribute('required', '');
                personInput.removeAttribute('required');
            }
        }

        // Handle Image Upload File Select
        document.getElementById('receiptFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                receiptBase64 = evt.target.result;
                const img = document.getElementById('image-preview');
                const placeholder = document.getElementById('image-placeholder');
                img.src = receiptBase64;
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        });

        // Initialize Page Data
        async function initialize() {
            // Set default date to today
            document.getElementById('dateBorrowed').value = formatDateForInput(new Date());

            // Add Event Listeners for radio toggle
            document.getElementById('borrowerTypePerson').addEventListener('change', toggleBorrowerFields);
            document.getElementById('borrowerTypeGroup').addEventListener('change', toggleBorrowerFields);

            try {
                // If editing existing record
                if (entryId) {
                    await loadLoanDetail();
                } else {
                    // Default the lender name field to "David Jonathan Pasumbal" on creation
                    document.getElementById('lenderPersonName').value = "David Jonathan Pasumbal";
                }

            } catch (err) {
                console.error("Initialization error:", err);
                alert("Failed to connect to backend service. Please make sure the API server is running on http://localhost:8080");
            }
        }

        // Load specific loan detail
        async function loadLoanDetail() {
            document.getElementById('page-title').textContent = "Edit Loan Entry";
            
            // Show edit-only fields
            document.getElementById('info-banner').classList.remove('hidden');
            document.getElementById('btn-delete').classList.remove('hidden');
            document.getElementById('amount-remaining-group').classList.remove('hidden');
            document.getElementById('payment-status-group').classList.remove('hidden');

            const res = await fetch(`${API_BASE}/entries/${entryId}`);
            if (!res.ok) throw new Error("Loan not found");
            const loan = await res.json();

            // Populate form
            document.getElementById('entryName').value = loan.entryName || '';
            document.getElementById('description').value = loan.description || '';
            document.getElementById('transactionType').value = loan.transactionType || '';
            document.getElementById('dateBorrowed').value = formatDateForInput(loan.dateBorrowed);
            document.getElementById('dateFullyPaid').value = formatDateForInput(loan.dateFullyPaid);
            
            // Borrower resolve
            if (loan.borrowerGroupName) {
                document.getElementById('borrowerTypeGroup').checked = true;
                toggleBorrowerFields();
                document.getElementById('borrowerGroupName').value = loan.borrowerGroupName;
            } else {
                document.getElementById('borrowerTypePerson').checked = true;
                toggleBorrowerFields();
                document.getElementById('borrowerPersonName').value = loan.borrowerPersonName || '';
            }

            document.getElementById('lenderPersonName').value = loan.lenderPersonName || '';
            document.getElementById('amountBorrowed').value = loan.amountBorrowed || 0;
            document.getElementById('amountRemaining').value = loan.amountRemaining || 0;
            document.getElementById('paymentStatus').value = loan.paymentStatus || 'UNPAID';
            document.getElementById('notes').value = loan.notes || '';
            document.getElementById('paymentNotes').value = loan.paymentNotes || '';

            // Update Info Banner
            document.getElementById('info-ref-id').textContent = loan.referenceId || 'N/A';
            document.getElementById('info-remaining').textContent = formatCurrency(loan.amountRemaining);
            
            const badge = document.getElementById('info-status-badge');
            badge.textContent = loan.paymentStatus || 'UNPAID';
            badge.className = `status-badge ${(loan.paymentStatus || 'unpaid').toLowerCase().replace(' ', '-')}`;

            // Receipt preview
            if (loan.receiptProofBase64) {
                receiptBase64 = loan.receiptProofBase64;
                const img = document.getElementById('image-preview');
                const placeholder = document.getElementById('image-placeholder');
                img.src = receiptBase64;
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }

            // Bind Delete Button Action
            document.getElementById('btn-delete').addEventListener('click', deleteLoan);
        }

        // Save Form Handler
        document.getElementById('loan-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const isPerson = document.getElementById('borrowerTypePerson').checked;
            const borrowerPersonName = isPerson ? document.getElementById('borrowerPersonName').value.trim() : null;
            const borrowerGroupName = !isPerson ? document.getElementById('borrowerGroupName').value.trim() : null;
            const lenderPersonName = document.getElementById('lenderPersonName').value.trim();

            const payload = {
                entryName: document.getElementById('entryName').value,
                description: document.getElementById('description').value,
                transactionType: document.getElementById('transactionType').value,
                dateBorrowed: document.getElementById('dateBorrowed').value ? new Date(document.getElementById('dateBorrowed').value) : null,
                dateFullyPaid: document.getElementById('dateFullyPaid').value ? new Date(document.getElementById('dateFullyPaid').value) : null,
                borrowerPersonName: borrowerPersonName,
                borrowerGroupName: borrowerGroupName,
                lenderPersonName: lenderPersonName,
                amountBorrowed: parseFloat(document.getElementById('amountBorrowed').value),
                notes: document.getElementById('notes').value,
                paymentNotes: document.getElementById('paymentNotes').value,
                receiptProofBase64: receiptBase64
            };

            // In Edit Mode, we include remaining and status fields
            if (entryId) {
                payload.entryId = entryId;
                payload.amountRemaining = parseFloat(document.getElementById('amountRemaining').value);
                payload.paymentStatus = document.getElementById('paymentStatus').value;
            }

            const url = entryId ? `${API_BASE}/entries/${entryId}` : `${API_BASE}/entries`;
            const method = entryId ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText || "Error saving entry");
                }

                window.location.href = 'index.html';

            } catch (err) {
                console.error("Error saving entry:", err);
                alert("Error saving loan entry: " + err.message);
            }
        });

        // Delete Loan Handler
        async function deleteLoan() {
            if (!confirm("Are you sure you want to delete this loan entry? This action cannot be undone.")) return;

            try {
                const response = await fetch(`${API_BASE}/entries/${entryId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText || "Error deleting entry");
                }

                window.location.href = 'index.html';

            } catch (err) {
                console.error("Error deleting entry:", err);
                alert("Error deleting entry: " + err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
