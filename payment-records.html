<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Tracking System - Payment Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .btn-pg-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, filter 0.2s;
            flex-shrink: 0;
        }
        .btn-pg-icon:hover { transform: scale(1.1); filter: brightness(1.15); }
        .btn-pg-edit  { background: rgba(255,255,255,0.25); }
        .btn-pg-delete { background: #e53935; }
        .btn-pg-delete:hover { background: #c62828; }
        .dashboard-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .summary-item { font-size: 1.1rem; color: rgba(255, 255, 255, 0.7); }
        .summary-item strong { color: #ffffff; margin-left: 10px; }
        
        .progress-wrapper { margin: 2rem 0; }
        .progress-meta { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 600; }
        .progress-track {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #81c784);
            width: 0%;
            transition: width 1s ease-in-out;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="profile">
            <div class="profile-avatar"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
            <span class="profile-name">David Pasumbal</span>
        </div>
        <nav class="navbar-pill">
            <a href="index.html">Home</a>
            <a href="all-payments.html" class="active">All Loans</a>
            <a href="people-groups.html">People</a>
        </nav>
    </header>

    <main class="main-content">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: -1rem;">
            <h1 class="page-title">Payments Records</h1>
            <a href="all-payments.html" class="btn btn-secondary" style="display: inline-flex; align-items: center; gap: 8px; text-decoration: none; padding: 0.6rem 1.4rem; border-radius: 50px; font-size: 0.95rem; font-weight: 700;">
                ← All Loans
            </a>
        </div>

        <div class="dashboard-card">
            <div class="dashboard-header">
                <div>
                    <h2 id="disp-borrower" style="font-size: 2rem; margin: 0;">Loading...</h2>
                    <p id="disp-ref" style="color: #4caf50; font-weight: 700; margin-top: 5px;">Ref #---</p>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-pg-icon btn-pg-edit" onclick="goToEdit()" title="Edit">
                        <img src="edit.png" style="width:16px;height:16px;" alt="Edit">
                    </button>
                    <button class="btn-pg-icon btn-pg-delete" onclick="deleteEntry()" title="Delete">
                        <img src="delete.png" style="width:16px;height:16px;" alt="Delete">
                    </button>
                </div>
            </div>

            <div class="summary-grid">
                <div class="summary-item">Type: <strong id="disp-type">---</strong></div>
                <div class="summary-item">Lender: <strong id="disp-lender">---</strong></div>
                <div class="summary-item">Borrowed: <strong id="disp-total" style="color: #ffca28;">₱0.00</strong></div>
                <div class="summary-item">Remaining: <strong id="disp-rem" style="color: #ef5350;">₱0.00</strong></div>
            </div>

            <div class="progress-wrapper">
                <div class="progress-meta">
                    <span id="disp-repaid">Repaid: ₱0.00</span>
                    <span id="disp-percent">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="transactions-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>PAYMENT HISTORY</h3>
                    <button class="btn btn-primary" onclick="openModal()">+ Add Payment</button>
                </div>
                
                <table class="transactions-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>DATE</th>
                            <th>AMOUNT</th>
                            <th>METHOD</th>
                            <th>NOTE</th>
                        </tr>
                    </thead>
                    <tbody id="pay-history-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="paymentModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(8px);">
        <div class="form-container" style="max-width: 450px; width: 90%; background: #121814; border: 1px solid rgba(255,255,255,0.1); padding: 2.5rem; border-radius: 20px;">
            <h2 style="margin-top: 0; margin-bottom: 1.5rem; color: #fff;">New Payment</h2>
            
            <div class="form-grid" style="grid-template-columns: 1fr; display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="form-group">
                <label for="payAmount">Amount (₱)</label>
                <input type="number" id="payAmount" class="form-input" placeholder="0.00">
            </div>

            <div class="form-group">
                <label for="payMethod">Payment Method</label>
                <select id="payMethod" class="form-select">
                    <option value="Cash">Cash</option>
                    <option value="GCash">GCash</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                </select>
            </div>

            <div class="form-group">
                <label for="payNote">Note</label>
                <input type="text" id="payNote" class="form-input" placeholder="Optional notes...">
            </div>
                </div>

            <div class="form-actions" style="margin-top: 2rem; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button id="savePaymentBtn" class="btn btn-primary" onclick="submitNewPayment()">💾 Save Payment</button>
            </div>
        </div>
    </div>

<script>
    const API_BASE = 'http://127.0.0.1:8080/api';
    const urlParams = new URLSearchParams(window.location.search);
    const entryId = urlParams.get('id');

    function formatCurrency(amt) {
        return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(amt || 0);
    }

    async function deleteEntry() {
        if (!entryId) return;
        if (!confirm('Are you sure you want to delete this loan entry and ALL its payment records? This cannot be undone.')) return;
        try {
            // First delete all payments for this entry
            await fetch(`${API_BASE}/payments/by-entry/${entryId}`, { method: 'DELETE' });
            // Then delete the loan entry itself
            const res = await fetch(`${API_BASE}/entries/${entryId}`, { method: 'DELETE' });
            if (res.ok || res.status === 204) {
                window.location.href = 'all-payments.html';
            } else {
                const err = await res.text();
                alert('Failed to delete entry: ' + err);
            }
        } catch (err) {
            alert('Network error: ' + err.message);
        }
    }

    function goToEdit() { window.location.href = `entry-detail.html?id=${entryId}`; }

    function openModal() { document.getElementById('paymentModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('paymentModal').style.display = 'none'; }

    function getMethodBadge(method) {
        let color = "#4caf50"; 
        let bg = "rgba(76, 175, 80, 0.2)";
        if (method === "GCash") {
            color = "#5c6bc0"; 
            bg = "rgba(92, 107, 192, 0.2)";
        } else if (method === "Bank Transfer") {
            color = "#7e57c2"; 
            bg = "rgba(126, 87, 194, 0.2)";
        }
        return `<span style="color: ${color}; background: ${bg}; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; border: 1px solid ${color}44;">${method}</span>`;
    }

async function loadDashboard() {
    if (!entryId) return;

    // Part 1: Load Loan Details (Header)
    try {
        const loanRes = await fetch(`${API_BASE}/entries/${entryId}`);
        const loan = await loanRes.json();

        // Use a fallback for the borrower name
        document.getElementById('disp-borrower').innerText = loan.borrowerPersonName || loan.borrowerGroupName || loan.entryName || "Loan Detail";
        document.getElementById('disp-ref').innerText = `Ref #${loan.referenceId || 'N/A'}`;
        document.getElementById('disp-type').innerText = loan.transactionType || "---";
        document.getElementById('disp-lender').innerText = loan.lenderPersonName || "---";
        document.getElementById('disp-total').innerText = formatCurrency(loan.amountBorrowed);
        document.getElementById('disp-rem').innerText = formatCurrency(loan.amountRemaining);

        const repaid = (loan.amountBorrowed || 0) - (loan.amountRemaining || 0);
        const percent = Math.round((repaid / loan.amountBorrowed) * 100) || 0;
        document.getElementById('progressFill').style.width = `${percent}%`;
        document.getElementById('disp-percent').innerText = `${percent}%`;
        document.getElementById('disp-repaid').innerText = `Repaid: ${formatCurrency(repaid)}`;
    } catch (err) {
        console.error("Loan details failed:", err);
        document.getElementById('disp-borrower').innerText = "Loan Not Found";
    }

    // Part 2: Load Payment History (Table)
    try {
        const payRes = await fetch(`${API_BASE}/payments`);
        const payments = await payRes.json();
        
        const filtered = Array.isArray(payments) 
            ? payments.filter(p => p.loanEntry && p.loanEntry.entryId === entryId)
            : [];
        
        const tbody = document.getElementById('pay-history-body');
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:gray;">No payments recorded yet.</td></tr>';
        } else {
            tbody.innerHTML = filtered.map((p, index) => `
                <tr style="border-bottom: 2px solid rgba(255,255,255,0.08); background: ${index % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'transparent'};">
                    <td style="color: rgba(255,255,255,0.4); padding: 1.3rem 0.75rem; font-size: 0.85rem;">#${index + 1}</td>
                    <td style="padding: 1.3rem 0.75rem;">${new Date(p.paymentDate).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'})}</td>
                    <td style="font-weight: 700; color: #ffca28; font-size: 1.05rem; padding: 1.3rem 0.75rem;">${formatCurrency(p.paymentAmount)}</td>
                    <td style="padding: 1.3rem 0.75rem;">${getMethodBadge(p.notes?.split('|')[0] || 'Cash')}</td>
                    <td style="color: rgba(255,255,255,0.5); font-style: italic; padding: 1.3rem 0.75rem;">${p.notes?.split('|')[1] || '—'}</td>
                </tr>
            `).join('');
        }
    } catch (err) {
        console.error("Payment history failed:", err);
        // We don't change the main header here so the loan data stays visible
    }
}
    async function submitNewPayment() {
        const amount = document.getElementById('payAmount').value;
        const method = document.getElementById('payMethod').value;
        const note = document.getElementById('payNote').value;

        if (!amount || parseFloat(amount) <= 0) {
            alert('Please enter a valid payment amount.');
            return;
        }

        const payload = {
            paymentAmount: parseFloat(amount),
            paymentDate: new Date().toISOString(),
            notes: `${method}|${note}`,
            loanEntry: { entryId: entryId }
        };

        try {
            const res = await fetch(`${API_BASE}/payments/add`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                closeModal();
                location.reload();
            } else {
                const errText = await res.text();
                alert('Failed to save payment: ' + errText);
            }
        } catch (err) {
            alert('Network error: ' + err.message);
        }
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
